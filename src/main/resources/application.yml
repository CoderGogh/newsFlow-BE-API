spring:
  application:
    name: newsflow-api

  datasource:
    url: jdbc:postgresql://localhost:5432/newsflow
    username: newsflow
    password: newsflow1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:newsflow-secret-key-change-in-production}
  expiration: 86400000   # 24시간 (ms)

ai:
  server:
    url: http://localhost:8000   # newsFlow-BE-AI FastAPI 서버

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs